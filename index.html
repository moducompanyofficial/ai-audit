<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Opportunity Audit — Intake</title>
<style>
:root{--ink:#16161a;--soft:#555;--line:#e3e1dc;--bg:#fbfaf8;--card:#fff;--accent:#1b4dff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;padding:40px 16px}
main{max-width:620px;margin:0 auto}
h1{font-size:1.6rem;letter-spacing:-.02em;margin-bottom:6px}
.lead{font-weight:600;margin-bottom:6px}
.trust{color:var(--soft);font-size:.9rem;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:16px}
label{display:block;font-weight:600;margin:0 0 6px;font-size:.95rem}
input,textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font:inherit;background:#fff;margin-bottom:15px}
textarea{min-height:70px;resize:vertical}
input:focus,textarea:focus{outline:2px solid var(--accent);border-color:var(--accent)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:0 15px}
button{background:var(--accent);color:#fff;border:0;padding:14px 30px;border-radius:999px;font-weight:600;font-size:1rem;cursor:pointer}
.foot{color:var(--soft);font-size:.85rem;margin-top:18px;text-align:center}
.foot a{color:var(--accent);text-decoration:none}
.hide{display:none}
@media(max-width:540px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<h1>AI Opportunity Audit</h1>
<p class="lead">Get your free AI automation audit — 5 min, async, no call.</p>
<p class="trust">I'll map your top automation opportunities with rough ROI and reply in writing. Used only to prepare your audit.</p>
<form action="https://formsubmit.co/2ccc539e3b5a51570e3929e9959d7356" method="POST">
<input type="hidden" name="_subject" value="New AI Audit intake">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://moducompanyofficial.github.io/ai-audit/">
<input type="text" name="_honey" class="hide">
<div class="card">
<div class="row">
<div><label>Name</label><input type="text" name="Name" required></div>
<div><label>Company</label><input type="text" name="Company" required></div>
</div>
<div class="row">
<div><label>Website</label><input type="text" name="Website" placeholder="https://"></div>
<div><label>Email</label><input type="email" name="email" required></div>
</div>
<label>Team size</label>
<input type="text" name="Team size" placeholder="e.g. 8 people">
</div>
<div class="card">
<label>Most time-consuming repetitive task</label>
<textarea name="Most time-consuming repetitive task" placeholder="What eats the most hours each week?" required></textarea>
<label>Current tools</label>
<input type="text" name="Current tools" placeholder="CRM, analytics, scheduler, CMS">
<label>One thing you'd automate in the next 90 days</label>
<textarea name="Automate in 90 days" placeholder="If one thing ran itself, what would it be?"></textarea>
<label>Best way to reach you</label>
<input type="text" name="Best contact" placeholder="Email / LinkedIn URL">
</div>
<button type="submit">Send audit request</button>
</form>
<p class="foot">Built by Modu Company - the free tool: <a href="https://github.com/moducompanyofficial/content-repurposer">content-repurposer</a></p>
</main>
</body>
</html>
